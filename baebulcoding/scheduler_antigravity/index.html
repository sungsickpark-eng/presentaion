<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Scheduler - 스마트 데일리 플래너</title>
  <!-- Google Fonts - Inter & Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-background">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <div class="app-container">
    <!-- 좌측 사이드바: 달력 및 통계 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="16" rx="3" stroke="currentColor" stroke-width="2" />
            <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M3 10H21" stroke="currentColor" stroke-width="2" />
            <circle cx="8" cy="14" r="1.5" fill="currentColor" />
            <circle cx="12" cy="14" r="1.5" fill="currentColor" />
            <circle cx="16" cy="14" r="1.5" fill="currentColor" />
          </svg>
          <span class="brand-name">Aether Planner</span>
        </div>
      </div>

      <!-- 오늘 요약 -->
      <div class="today-panel">
        <span class="today-label">TODAY</span>
        <h1 class="today-date-str" id="todayDateStr">2026년 7월 1일</h1>
        <p class="today-day-str" id="todayDayStr">수요일</p>
      </div>

      <!-- 달력 카드 -->
      <div class="card calendar-card">
        <div class="calendar-header">
          <button id="prevMonthBtn" class="btn-icon" aria-label="이전 달">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <h2 id="calendarTitle" class="calendar-title">2026년 7월</h2>
          <button id="nextMonthBtn" class="btn-icon" aria-label="다음 달">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </div>
        <div class="calendar-weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div id="calendarDays" class="calendar-days">
          <!-- JS에서 동적으로 생성됨 -->
        </div>
      </div>

      <!-- 통계 카드 -->
      <div class="card stats-card">
        <div class="stats-header">
          <h3 class="card-title">오늘의 달성도</h3>
          <span class="stats-ratio" id="statsRatio">0 / 0</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <p class="stats-text" id="statsText">오늘 등록된 일정이 없습니다.</p>
      </div>
    </aside>

    <!-- 우측 메인 영역: 시간 단위 스케줄러 타임라인 -->
    <main class="main-content">
      <header class="timeline-header">
        <div class="header-info">
          <h2 class="selected-date-title" id="selectedDateTitle">2026년 7월 1일 수요일</h2>
          <p class="selected-date-status" id="selectedDateStatus">오늘 예정된 일정 목록입니다.</p>
        </div>
        <div class="header-actions">
          <button id="goToTodayBtn" class="btn-secondary">
            <svg class="btn-icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
            오늘로 이동
          </button>
          <button id="addTaskBtn" class="btn-primary">
            <svg class="btn-icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            일정 등록
          </button>
        </div>
      </header>

      <!-- 타임라인 리스트 영역 -->
      <div class="timeline-scroll-container">
        <div class="timeline-list" id="timelineList">
          <!-- JS에서 동적으로 일정이 생성됨 -->
        </div>
      </div>
    </main>
  </div>

  <!-- 일정 등록 모달창 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card animate-slide-up">
      <div class="modal-header">
        <h3 class="modal-title">새 일정 등록</h3>
        <button id="closeModalBtn" class="btn-icon" aria-label="닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="addTaskForm" class="modal-form">
        <div class="form-group">
          <label for="taskTime">시간 설정</label>
          <input type="time" id="taskTime" required>
        </div>
        <div class="form-group">
          <label for="taskName">일정 내용</label>
          <input type="text" id="taskName" placeholder="어떤 일정이 예정되어 있나요?" autocomplete="off" required>
        </div>
        <div class="modal-footer">
          <button type="button" id="cancelModalBtn" class="btn-secondary">취소</button>
          <button type="submit" class="btn-primary">등록하기</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
