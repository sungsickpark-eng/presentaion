<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>배불뚝이 코딩 · EP.04 전용 프로그램 설치</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0D16;
  --bg-2:#0F1420;
  --panel:#141A28;
  --panel-2:#1B2233;
  --panel-border:rgba(244,241,234,0.10);
  --ink:#F4F1EA;
  --ink-dim:#9AA1BA;
  --ink-faint:#5E6580;
  --amber:#FFB648;
  --amber-dim:#8A6A33;
  --claude:#D97757;
  --codex:#2FBF8F;
  --anti:#5B8DEF;
  --danger:#FF6B6B;
  --radius-lg:22px;
  --radius-md:14px;
  --radius-sm:8px;
  --font-display:'Noto Sans KR', sans-serif;
  --font-body:'Noto Sans KR', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
  --accent:#FFB648;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  background:
    radial-gradient(circle at 15% 10%, rgba(91,141,239,0.10), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(217,119,87,0.10), transparent 45%),
    var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--amber);color:#1a1206;}

#app{height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;}

/* ---------- global progress ---------- */
.global-progress{height:3px;width:100%;background:var(--panel-border);flex:0 0 auto;}
.global-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--amber),var(--claude));transition:width .35s ease;}

/* ---------- top bar ---------- */
.topbar{
  flex:0 0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 22px;
  border-bottom:1px solid var(--panel-border);
  background:rgba(10,13,22,0.7);
  backdrop-filter:blur(6px);
  gap:16px;
}
.brand{display:flex;align-items:baseline;gap:10px;font-family:var(--font-display);font-weight:900;font-size:17px;letter-spacing:.5px;color:var(--ink);white-space:nowrap;}
.brand span{font-family:var(--font-body);font-weight:500;font-size:11px;color:var(--ink-dim);letter-spacing:.3px;}
.act-dots{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px;}
.act-dots::-webkit-scrollbar{display:none;}
.act-dot{
  flex:0 0 auto;width:9px;height:9px;border-radius:50%;
  background:var(--panel-2);border:1px solid var(--panel-border);
  cursor:pointer;transition:all .25s ease;
}
.act-dot:hover{transform:scale(1.3);}
.act-dot.done{background:var(--ink-faint);}
.act-dot.active{
  width:22px;border-radius:6px;
  background:var(--accent-dot,var(--amber));
  box-shadow:0 0 10px var(--accent-dot,var(--amber));
}

/* ---------- stage ---------- */
.stage-wrap{flex:1 1 auto;position:relative;overflow:hidden;}
.stage{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:26px 8vw 300px;
  overflow:hidden;
}
.stage-inner{width:100%;max-width:1080px;display:flex;flex-direction:column;align-items:center;gap:18px;animation:stageIn .5s ease both;}
@keyframes stageIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.eyebrow-badge{
  font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;
  color:var(--accent);border:1px solid var(--accent);
  padding:4px 12px;border-radius:999px;text-transform:uppercase;
  background:color-mix(in srgb, var(--accent) 12%, transparent);
  white-space:nowrap;
}
.headline{
  font-family:var(--font-display);
  font-weight:900;
  font-size:clamp(22px,3.4vw,40px);
  line-height:1.35;text-align:center;color:var(--ink);
  letter-spacing:.2px;
  max-width:900px;
}
.headline .hl{color:var(--accent);}

/* nav buttons */
.nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  width:46px;height:46px;border-radius:50%;
  background:rgba(20,26,40,0.75);border:1px solid var(--panel-border);
  color:var(--ink);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s ease;backdrop-filter:blur(4px);z-index:20;
}
.nav-btn:hover{background:var(--accent);color:#0A0D16;transform:translateY(-50%) scale(1.08);}
.nav-prev{left:16px;} .nav-next{right:16px;}
.click-zone{position:absolute;top:0;bottom:0;width:18%;z-index:5;cursor:pointer;}
.click-zone.left{left:0;} .click-zone.right{right:0;}

/* ---------- caption bar ---------- */
.caption-bar{
  --cap-h:150px;
  position:absolute;left:0;right:0;
  bottom:var(--cap-h);
  height:var(--cap-h);
  padding:14px 24px 10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  z-index:15;
  pointer-events:none;
}
.caption-bar > *{pointer-events:auto;}
.caption-eyebrow{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-faint);letter-spacing:1.2px;text-transform:uppercase;}
.caption-card{
  width:100%;max-width:820px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-left:4px solid var(--accent);
  border-radius:var(--radius-md);
  padding:16px 28px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .3s ease;
}
.caption-text{
  font-size:clamp(15px,2.1vw,21px);
  font-weight:700;line-height:1.55;text-align:center;
  color:var(--ink);
  min-height:1.55em;
}
.caption-text.enter{animation:capIn .32s ease both;}
@keyframes capIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.caption-meta{display:flex;align-items:center;gap:10px;width:100%;max-width:420px;}
.caption-progress{flex:1;height:3px;background:var(--panel-2);border-radius:2px;overflow:hidden;}
.caption-progress-fill{height:100%;background:var(--accent);transition:width .3s ease;}
.caption-count{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);white-space:nowrap;}

/* ---------- shared components ---------- */
.panel{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius-lg);}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;
  background:var(--panel-2);border:1px solid var(--panel-border);color:var(--ink-dim);
}
.chip.solid{background:var(--accent);color:#0A0D16;border-color:var(--accent);}
.pulse{animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.float{animation:floaty 3.2s ease-in-out infinite;}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.spin-slow{animation:spinSlow 6s linear infinite;}
@keyframes spinSlow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* === HOOK === */
.hook-diagram{display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap;margin-top:6px;}
.browser-cluster{position:relative;display:flex;gap:8px;padding:16px 20px;background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius-md);}
.tab-chip{width:30px;height:30px;border-radius:6px;background:var(--panel-2);display:flex;align-items:center;justify-content:center;font-size:15px;opacity:.55;animation:shake 2.4s ease-in-out infinite;animation-delay:calc(var(--d) * .12s);}
@keyframes shake{0%,100%{transform:rotate(0deg);}20%{transform:rotate(-6deg);}40%{transform:rotate(5deg);}60%{transform:rotate(-3deg);}80%{transform:rotate(2deg);}}
.big-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:46px;color:var(--danger);text-shadow:0 0 18px var(--danger);}
.diagram-arrow{font-size:26px;color:var(--ink-faint);}
.app-cluster{display:flex;gap:12px;}
.app-glyph{
  width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-size:26px;box-shadow:0 0 22px currentColor;
}
.app-glyph.claude{background:color-mix(in srgb, var(--claude) 22%, var(--panel));color:var(--claude);border:1px solid var(--claude);}
.app-glyph.codex{background:color-mix(in srgb, var(--codex) 22%, var(--panel));color:var(--codex);border:1px solid var(--codex);}
.app-glyph.anti{background:color-mix(in srgb, var(--anti) 22%, var(--panel));color:var(--anti);border:1px solid var(--anti);}

/* === TARGET === */
.tag-cloud{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:620px;margin-top:4px;}
.tag-cloud span{
  font-family:var(--font-mono);font-size:13px;color:var(--ink-faint);
  border:1px dashed var(--panel-border);padding:5px 10px;border-radius:8px;
  animation:floaty 3s ease-in-out infinite;
}
.warn-icon{font-size:52px;filter:drop-shadow(0 0 16px var(--danger));}

/* === GREETING === */
.host-card{display:flex;align-items:center;gap:22px;padding:26px 34px;}
.host-avatar{
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(145deg, var(--claude), var(--anti));
  display:flex;align-items:center;justify-content:center;font-size:38px;
  box-shadow:0 0 30px rgba(217,119,87,.4);
  flex:0 0 auto;
}
.host-meta h3{margin:0 0 4px;font-family:var(--font-display);font-weight:900;font-size:20px;}
.host-meta p{margin:0;color:var(--ink-dim);font-size:13px;}
.dog-badge{
  position:absolute;bottom:14px;right:18px;display:flex;align-items:center;gap:6px;
  background:var(--panel-2);border:1px solid var(--panel-border);border-radius:999px;
  padding:6px 12px;font-size:12px;color:var(--ink-dim);
}
.dog-badge .paw{display:inline-block;animation:wag 1s ease-in-out infinite;transform-origin:bottom center;}
@keyframes wag{0%,100%{transform:rotate(-12deg);}50%{transform:rotate(12deg);}}

/* === ERA TIMELINE === */
.era-timeline{width:100%;display:flex;flex-direction:column;gap:22px;margin-top:4px;}
.era-track{position:relative;display:flex;justify-content:space-between;padding:0 10px;}
.era-line{position:absolute;top:19px;left:30px;right:30px;height:2px;background:var(--panel-border);z-index:0;}
.era-line-fill{position:absolute;top:19px;left:30px;height:2px;background:var(--accent);z-index:1;transition:width .4s ease;}
.era-stop{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
.era-dot{width:38px;height:38px;border-radius:50%;background:var(--panel);border:2px solid var(--panel-border);display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .3s ease;color:var(--ink-faint);}
.era-stop.active .era-dot{border-color:var(--accent);background:var(--accent);color:#0A0D16;box-shadow:0 0 18px var(--accent);transform:scale(1.15);}
.era-stop.past .era-dot{border-color:var(--accent);color:var(--accent);}
.era-label{font-size:11.5px;color:var(--ink-faint);text-align:center;max-width:120px;}
.era-stop.active .era-label{color:var(--ink);font-weight:700;}
.era-tagbox{text-align:center;padding:16px 22px;min-width:280px;}
.era-tagbox .tag{font-family:var(--font-mono);font-size:12px;color:var(--accent);margin-bottom:6px;}
.era-tagbox .desc{font-size:15px;font-weight:600;}

/* === ROSTER === */
.roster-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.roster-card{
  width:210px;padding:22px 18px;text-align:center;position:relative;overflow:hidden;
  animation:cardIn .6s ease both;
}
.roster-card:nth-child(1){animation-delay:.05s;} .roster-card:nth-child(2){animation-delay:.2s;} .roster-card:nth-child(3){animation-delay:.35s;}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) rotateY(90deg);}to{opacity:1;transform:translateY(0) rotateY(0);}}
.roster-glyph{width:64px;height:64px;border-radius:18px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:30px;}
.roster-card h4{font-family:var(--font-display);font-weight:900;font-size:17px;margin:0 0 4px;}
.roster-card p{font-size:12px;color:var(--ink-dim);margin:0;}
.roster-num{position:absolute;top:10px;left:12px;font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);}

/* === FEATURE CARD (overview) === */
.persona-head{display:flex;align-items:center;gap:14px;}
.persona-glyph{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto;}
.persona-name{font-family:var(--font-display);font-weight:900;font-size:22px;}
.persona-tag{font-size:12.5px;color:var(--ink-dim);}
.bullet-grid{width:100%;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:6px;}
.bullet-card{padding:14px 16px;display:flex;flex-direction:column;gap:6px;animation:bulletIn .5s ease both;}
.bullet-card:nth-child(1){animation-delay:.05s;}.bullet-card:nth-child(2){animation-delay:.15s;}.bullet-card:nth-child(3){animation-delay:.25s;}.bullet-card:nth-child(4){animation-delay:.35s;}.bullet-card:nth-child(5){animation-delay:.45s;}
@keyframes bulletIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.bullet-label{font-size:10.5px;font-weight:700;color:var(--accent);letter-spacing:.5px;}
.bullet-text{font-size:12.5px;line-height:1.55;color:var(--ink-dim);}

/* === INSTALL STAGE === */
.step-pills{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.step-pill{
  font-size:11px;padding:5px 10px;border-radius:999px;background:var(--panel-2);
  color:var(--ink-faint);border:1px solid var(--panel-border);transition:all .25s ease;white-space:nowrap;
}
.step-pill.active{background:var(--accent);color:#0A0D16;border-color:var(--accent);font-weight:700;}
.mock-window{width:100%;max-width:640px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--panel-border);background:var(--panel);}
.mock-titlebar{display:flex;align-items:center;gap:6px;padding:9px 12px;background:var(--panel-2);}
.mock-dot{width:9px;height:9px;border-radius:50%;background:var(--ink-faint);}
.mock-addr{flex:1;margin-left:10px;background:var(--bg);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--ink-faint);font-family:var(--font-mono);}
.mock-body{padding:26px;display:flex;flex-direction:column;align-items:center;gap:12px;min-height:150px;justify-content:center;}
.mock-body .big-emoji{font-size:40px;}
.mock-note{font-size:12px;color:var(--ink-dim);text-align:center;}
.mock-sidebar-row{display:flex;width:100%;gap:0;}
.mock-sidebar{width:80px;background:var(--bg);border-right:1px solid var(--panel-border);padding:10px 6px;display:flex;flex-direction:column;gap:6px;}
.mock-sidebar div{height:8px;border-radius:4px;background:var(--panel-2);}
.mock-tabs{display:flex;gap:14px;padding:8px 16px;border-bottom:1px solid var(--panel-border);font-size:11px;color:var(--ink-faint);}
.mock-tabs .on{color:var(--accent);font-weight:700;}

/* === PROMPT DEMO === */
.chat-panel{width:100%;max-width:640px;}
.chat-msg{
  margin-top:10px;padding:12px 16px;border-radius:12px;font-family:var(--font-mono);
  font-size:12.5px;line-height:1.6;color:var(--ink);
  background:var(--panel-2);border:1px solid var(--panel-border);
  white-space:pre-wrap;animation:typeIn .4s ease both;
}
@keyframes typeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.chat-msg.edit{border-color:var(--accent);}
.chat-tag{font-family:var(--font-body);font-size:10.5px;color:var(--accent);font-weight:700;margin-bottom:6px;display:block;}
.result-box{
  margin-top:14px;width:100%;max-width:640px;padding:16px;border-radius:12px;
  background:var(--panel);border:1px solid var(--panel-border);
  display:flex;align-items:center;gap:12px;animation:typeIn .4s ease both;
}
.result-box .icon{font-size:26px;}
.result-box .txt{font-size:12.5px;color:var(--ink-dim);}

/* === COMPARE === */
.compare-table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:var(--radius-md);border:1px solid var(--panel-border);}
.compare-table th,.compare-table td{padding:12px 14px;font-size:12.5px;text-align:left;border-bottom:1px solid var(--panel-border);}
.compare-table th{background:var(--panel-2);color:var(--ink-dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
.compare-table td{background:var(--panel);color:var(--ink);line-height:1.5;}
.compare-table tr:last-child td{border-bottom:none;}
.compare-persona{display:flex;align-items:center;gap:8px;font-weight:700;}
.bar-chart{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{width:110px;font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:6px;flex:0 0 auto;}
.bar-track{flex:1;height:16px;background:var(--panel-2);border-radius:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;}
.bar-fill span{font-size:10px;font-family:var(--font-mono);color:#0A0D16;font-weight:700;}
.pull-quote{max-width:560px;text-align:center;font-family:var(--font-display);font-weight:900;font-size:clamp(18px,2.6vw,26px);color:var(--accent);padding:8px 0;}

/* === ENDING === */
.cta-row{display:flex;gap:22px;}
.cta-icon{font-size:38px;animation:bounce 1.6s ease-in-out infinite;}
.cta-icon:nth-child(2){animation-delay:.2s;} .cta-icon:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.next-ep{padding:20px 30px;display:flex;align-items:center;gap:16px;}
.terminal-glyph{
  width:56px;height:56px;border-radius:12px;background:#000;border:1px solid var(--accent);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);
  color:var(--accent);font-size:20px;box-shadow:0 0 20px var(--accent);flex:0 0 auto;
}
.terminal-glyph::after{content:'▊';animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.next-ep-meta div:first-child{font-size:11px;color:var(--ink-faint);font-family:var(--font-mono);}
.next-ep-meta div:last-child{font-size:17px;font-weight:700;font-family:var(--font-display);}

/* responsive */
@media (max-width:720px){
  .brand span{display:none;}
  .stage{padding:16px 5vw 220px;}
  .caption-bar{--cap-h:110px;}
  .host-card{flex-direction:column;text-align:center;padding:20px;}
  .persona-head{flex-direction:column;text-align:center;}
  .nav-btn{width:38px;height:38px;font-size:18px;}
  .bar-label{width:82px;font-size:11px;}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:0.001s !important;animation-iteration-count:1 !important;transition-duration:0.001s !important;}
}
</style>
</head>
<body>
<div id="app">
  <div class="global-progress"><div class="global-progress-fill" id="globalFill"></div></div>
  <header class="topbar">
    <div class="brand">🥖 배불뚝이 코딩 <span>EP.04 · 전용 프로그램 설치 &amp; 3대 AI 팀원 비교</span></div>
    <div class="act-dots" id="actDots"></div>
  </header>
  <div class="stage-wrap" id="stageWrap">
    <div class="click-zone left" id="zoneLeft"></div>
    <div class="click-zone right" id="zoneRight"></div>
    <button class="nav-btn nav-prev" id="prevBtn" aria-label="이전">‹</button>
    <div class="stage" id="stage"></div>
    <button class="nav-btn nav-next" id="nextBtn" aria-label="다음">›</button>
  </div>
  <footer class="caption-bar">
    <div class="caption-eyebrow" id="capEyebrow"></div>
    <div class="caption-card">
      <div class="caption-text" id="capText"></div>
    </div>
    <div class="caption-meta">
      <div class="caption-progress"><div class="caption-progress-fill" id="capFill"></div></div>
      <div class="caption-count" id="capCount"></div>
    </div>
  </footer>
</div>
<script>
/* ============ PERSONAS ============ */
const PERSONA = {

    '파일이 10개, 20개 늘면 사람이 지쳐서 포기하게 됩니다.',
    '근데 전용 프로그램은 AI가 내 폴더 전체를 양손에 쥐고 요리하기 때문에, 우리는 가만히 앉아 지시만 하면 됩니다.',
    '유료사용이라는 큰 장벽이 있긴 하지만 한달에 4~5일만 커피 안 마신다고 생각하시고 유료 결제를 해보시면 신세계를 경험하실 수 있으실 겁니다.'
  ]
},

/* ---------- 15. ENDING ---------- */
{
  id:'ending', kind:'ending', accent:'#FFB648',
  eyebrow:'ENDING · 11:10 – 12:00',
  headline:'🏁 다음 편 예고: CLI 바이브 코딩',
  lines:[
    '브라우저라는 좁은 감옥을 벗어나 내 컴퓨터에 AI 팀을 들이니까, 코딩 속도와 자유도가 수십 배 뛰는 게 느껴지시죠?',
    '이제 여러분 컴퓨터는 단순한 모니터가 아니라 AI 개발 기지가 된 겁니다.',
    '핵심은 하나예요.',
    "이제 코딩은 '문법 암기'가 아니라, AI 팀한테 방향을 정해주는 감독의 일입니다.",
    '이렇게 눈에 보이는 전용 앱을 정중히 마스터했으니, 딱 하나 남았습니다.',
    "이 프로그램들과 AI를 빛의 속도로 연결하는 진짜 프로들의 치트키, 바로 그 무서운 '검은 창', CLI예요.",
    "다음 5편에서는 는 CLI 바이브 코딩'으로 돌아오겠습니다.",
    '의외로 이게 더 빠르고 강력한 순간이 있거든요.',
    '오늘 내용이 도움이 되셨다면 지금 구독·좋아요·알림 설정까지 눌러주시고 다음 편에서 만나요.',
    '지금까지 배불뚝이 코딩이었습니다.',
    '감사합니다!'
  ]
}

];

/* flatten era rows into lines + rowMap */
(function(){
  const era = ACTS.find(a=>a.id==='era');
  era.lines = []; era.rowMap = [];
  era.rows.forEach((r,ri)=>{ r.lines.forEach(l=>{ era.lines.push(l); era.rowMap.push(ri); }); });
})();
</script>
<script>
/* ============ HELPERS ============ */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function personaGlyphHTML(key, size){
  const p = PERSONA[key];
  size = size || 52;
  return `<div class="persona-glyph" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.46)}px;background:color-mix(in srgb, ${p.accent} 22%, var(--panel));color:${p.accent};border:1px solid ${p.accent};">${p.icon}</div>`;
}

/* ============ STAGE BUILDERS ============ */
function buildHook(act){
  return `
    <div class="eyebrow-badge">🚫 STOP DOING THIS</div>
    <h1 class="headline">${act.headline}</h1>
    <div class="hook-diagram">
      <div class="browser-cluster">
        ${[0,1,2,3,4].map(i=>`<div class="tab-chip" style="--d:${i}">🌐</div>`).join('')}
        <div class="big-x pulse">❌</div>
      </div>
      <div class="diagram-arrow">➡️</div>
      <div class="app-cluster">
        <div class="app-glyph claude float" style="animation-delay:.1s">🎓</div>
        <div class="app-glyph codex float" style="animation-delay:.3s">🛡️</div>
        <div class="app-glyph anti float" style="animation-delay:.5s">🚀</div>
      </div>
    </div>
    <div class="chip">⏱ 오늘 딱 3가지만 설치하면 끝</div>`;
}

function buildTarget(act){
  const words = ['복붙…','복붙…','Ctrl+C','Ctrl+V','또 복붙…','시간 낭비'];
  return `
    <div class="eyebrow-badge" style="color:var(--danger);border-color:var(--danger);background:rgba(255,107,107,.12)">⚠️ WARNING</div>
    <h1 class="headline">${act.headline}</h1>
    <div class="warn-icon pulse">🥴</div>
    <div class="tag-cloud">${words.map((w,i)=>`<span style="animation-delay:${i*.15}s">${w}</span>`).join('')}</div>`;
}

function buildGreeting(act){
  return `
    <div class="eyebrow-badge">HELLO 👋</div>
    <h1 class="headline">${act.headline}</h1>
    <div class="panel host-card" style="position:relative;">
      <div class="host-avatar">💻</div>
      <div class="host-meta">
        <h3>배불뚝이 코딩</h3>
        <p>쉽고 정직한 바이브 코딩 가이드</p>
      </div>
      <div class="dog-badge"><span class="paw">🐾</span> 송송이 감독 중</div>
    </div>`;
}

function buildEra(act, li){
  const ri = act.rowMap[li];
  const fillPct = (ri/(act.rows.length-1))*100;
  const row = act.rows[ri];
  return `
    <div class="eyebrow-badge">⏳ TIMELINE</div>
    <h1 class="headline" style="font-size:clamp(18px,2.6vw,28px)">${act.headline}</h1>
    <div class="era-timeline">
      <div class="era-track">
        <div class="era-line"></div>
        <div class="era-line-fill" style="width:calc(${fillPct}% * (100% - 60px) / 100%)"></div>
        ${act.rows.map((r,i)=>`
          <div class="era-stop ${i===ri?'active':(i<ri?'past':'')}">
            <div class="era-dot">${r.icon}</div>
            <div class="era-label">${r.desc}</div>
          </div>`).join('')}
      </div>
      <div class="panel era-tagbox">
        <div class="tag">${row.tag}</div>
        <div class="desc">${row.desc}</div>
      </div>
    </div>`;
}

function buildRoster(act){
  const order = ['codex','claude','anti'];
  return `
    <div class="eyebrow-badge">TEAM ROSTER</div>
    <h1 class="headline">${act.headline}</h1>
    <div class="roster-row">
      ${order.map((k,i)=>{ const p=PERSONA[k]; return `
        <div class="panel roster-card" style="border-color:${p.accent}55;">
          <div class="roster-num">0${i+1}</div>
          <div class="roster-glyph" style="background:color-mix(in srgb, ${p.accent} 22%, var(--panel));color:${p.accent};border:1px solid ${p.accent};">${p.icon}</div>
          <h4>${p.name}</h4>
          <p>${p.tag}</p>
        </div>`; }).join('')}
    </div>`;
}

function buildFeature(act){
  const p = PERSONA[act.persona];
  return `
    <div class="eyebrow-badge">${p.name.toUpperCase()} FILE</div>
    <div class="persona-head">
      ${personaGlyphHTML(act.persona,52)}
      <div>
        <div class="persona-name" style="color:${p.accent}">${p.name}</div>
        <div class="persona-tag">${p.tag}</div>
      </div>
    </div>
    <h1 class="headline" style="font-size:clamp(16px,2.2vw,22px);color:var(--ink-dim)">${act.headline}</h1>
    <div class="bullet-grid">
      ${act.bullets.map(b=>`
        <div class="panel bullet-card" style="border-color:${p.accent}33;">
          <div class="bullet-label" style="color:${p.accent}">${b.label}</div>
          <div class="bullet-text">${esc(b.text)}</div>
        </div>`).join('')}
    </div>`;
}

function buildInstall(act, li){
  const p = PERSONA[act.persona];
  const pct = li/(act.lines.length-1);
  const stepIdx = Math.min(act.steps.length-1, Math.floor(pct*act.steps.length));
  const isApp = pct > 0.32;
  return `
    <div class="eyebrow-badge">${p.name.toUpperCase()} INSTALL</div>
    <div class="persona-head">
      ${personaGlyphHTML(act.persona,40)}
      <div class="persona-name" style="font-size:18px;color:${p.accent}">${act.headline}</div>
    </div>
    <div class="step-pills">
      ${act.steps.map((s,i)=>`<div class="step-pill ${i===stepIdx?'active':''}" style="${i===stepIdx?`background:${p.accent};border-color:${p.accent}`:''}">${s}</div>`).join('')}
    </div>
    <div class="mock-window">
      ${isApp ? `
        <div class="mock-titlebar"><div class="mock-dot"></div><div class="mock-dot"></div><div class="mock-dot"></div>
          <div class="mock-addr">🖥 ${p.name} Desktop</div></div>
        <div class="mock-tabs"><span>챗</span><span>코워크</span><span class="on" style="color:${p.accent}">코드</span></div>
        <div class="mock-sidebar-row">
          <div class="mock-sidebar">${[0,1,2,3].map(()=>`<div></div>`).join('')}</div>
          <div class="mock-body" style="flex:1;">
            <div class="big-emoji">📁</div>
            <div class="mock-note">프로젝트 폴더 연결 · 프롬프트 입력 대기 중</div>
          </div>
        </div>` : `
        <div class="mock-titlebar"><div class="mock-dot"></div><div class="mock-dot"></div><div class="mock-dot"></div>
          <div class="mock-addr">🔍 chrome — "${p.name}" 검색</div></div>
        <div class="mock-body">
          <div class="big-emoji">⬇️</div>
          <div class="mock-note">공식 사이트에서 데스크톱 앱 다운로드 중…</div>
        </div>`}
    </div>`;
}

function buildPrompt(act, li){
  const p = PERSONA[act.persona];
  const blocks = act.promptBlocks.filter(b=>li>=b.showFrom);
  return `
    <div class="eyebrow-badge">${p.name.toUpperCase()} DEMO</div>
    <div class="persona-head">
      ${personaGlyphHTML(act.persona,40)}
      <div class="persona-name" style="font-size:18px;color:${p.accent}">${act.headline}</div>
    </div>
    <div class="chat-panel">
      ${blocks.map(b=>{
        if(b.result){
          return `<div class="result-box" style="border-color:${p.accent}55;"><div class="icon">${b.icon}</div><div class="txt">${esc(b.text)}</div></div>`;
        }
        return `<div class="chat-msg ${b.edit?'edit':''}" style="${b.edit?`border-color:${p.accent}`:''}">
          <span class="chat-tag" style="color:${p.accent}">${b.tag}</span>${esc(b.text)}</div>`;
      }).join('')}
      ${blocks.length===0 ? `<div class="mock-note" style="text-align:center;margin-top:20px;">💬 프롬프트 입력 대기 중…</div>` : ''}
    </div>`;
}

function buildCompare(act, li){
  const showQuote = li===1;
  return `
    <div class="eyebrow-badge">FINAL COMPARE</div>
    <h1 class="headline" style="font-size:clamp(17px,2.4vw,24px)">${act.headline}</h1>
    <table class="compare-table">
      <thead><tr>${act.table.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>
        ${act.table.rows.map(r=>{ const p=PERSONA[r[0]]; return `
          <tr>
            <td class="compare-persona" style="color:${p.accent}">${p.icon} ${p.name}</td>
            <td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td>
          </tr>`; }).join('')}
      </tbody>
    </table>
    ${showQuote ? `<div class="pull-quote">"내 컴퓨터 파일을 AI가 직접 만질 수 있느냐"</div>` : ''}`;
}

function buildEnding(act){
  return `
    <div class="eyebrow-badge">SEE YOU NEXT TIME</div>
    <h1 class="headline">${act.headline}</h1>
    <div class="cta-row">
      <div class="cta-icon">🔔</div><div class="cta-icon">👍</div><div class="cta-icon">📢</div>
    </div>
    <div class="panel next-ep">
      <div class="terminal-glyph">&gt;_</div>
      <div class="next-ep-meta">
        <div>NEXT · EP.05</div>
        <div>CLI 바이브 코딩</div>
      </div>
    </div>`;
}

function buildStage(act, li){
  switch(act.kind){
    case 'hook': return buildHook(act);
    case 'target': return buildTarget(act);
    case 'greeting': return buildGreeting(act);
    case 'era': return buildEra(act, li);
    case 'roster': return buildRoster(act);
    case 'feature': return buildFeature(act);
    case 'install': return buildInstall(act, li);
    case 'prompt': return buildPrompt(act, li);
    case 'compare': return buildCompare(act, li);
    case 'ending': return buildEnding(act);
    default: return '';
  }
}

/* ============ STATE & RENDER ============ */
let actIdx = 0, lineIdx = 0;
const totalLines = ACTS.reduce((s,a)=>s+a.lines.length,0);

const stageEl = document.getElementById('stage');
const capEyebrow = document.getElementById('capEyebrow');
const capText = document.getElementById('capText');
const capFill = document.getElementById('capFill');
const capCount = document.getElementById('capCount');
const globalFill = document.getElementById('globalFill');
const actDotsEl = document.getElementById('actDots');

function buildDots(){
  actDotsEl.innerHTML = ACTS.map((a,i)=>`<div class="act-dot" data-i="${i}" title="${a.eyebrow}" style="--accent-dot:${a.accent}"></div>`).join('');
  [...actDotsEl.children].forEach(d=>d.addEventListener('click', ()=>{ actIdx = +d.dataset.i; lineIdx = 0; render(true); }));
}

function linesBefore(idx){ let s=0; for(let i=0;i<idx;i++) s+=ACTS[i].lines.length; return s; }

/* 라인이 바뀔 때마다 시각 요소가 반응해야 하는 씬 종류 (그 외에는 씬 진입시 한 번만 렌더링) */
const DYNAMIC_KINDS = new Set(['era','install','prompt','compare']);

function render(stageChanged){
  const act = ACTS[actIdx];
  document.documentElement.style.setProperty('--accent', act.accent);
  const needsVisualUpdate = stageChanged || DYNAMIC_KINDS.has(act.kind);
  if(needsVisualUpdate){
    if(stageChanged){
      stageEl.innerHTML = `<div class="stage-inner" style="--accent:${act.accent}">${buildStage(act, lineIdx)}</div>`;
    } else {
      const inner = stageEl.querySelector('.stage-inner');
      inner.innerHTML = buildStage(act, lineIdx);
    }
  }
  capEyebrow.textContent = act.eyebrow;
  capText.textContent = act.lines[lineIdx];
  capText.classList.remove('enter'); void capText.offsetWidth; capText.classList.add('enter');
  capFill.style.width = ((lineIdx+1)/act.lines.length*100)+'%';
  capCount.textContent = (lineIdx+1)+' / '+act.lines.length;
  const doneGlobal = linesBefore(actIdx)+lineIdx+1;
  globalFill.style.width = (doneGlobal/totalLines*100)+'%';
  [...actDotsEl.children].forEach((d,i)=>{
    d.classList.toggle('active', i===actIdx);
    d.classList.toggle('done', i<actIdx);
  });
}

function next(){
  const act = ACTS[actIdx];
  if(lineIdx < act.lines.length-1){ lineIdx++; render(false); }
  else if(actIdx < ACTS.length-1){ actIdx++; lineIdx=0; render(true); }
}
function prev(){
  if(lineIdx>0){ lineIdx--; render(false); }
  else if(actIdx>0){ actIdx--; lineIdx=ACTS[actIdx].lines.length-1; render(true); }
}

document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('zoneLeft').addEventListener('click', prev);
document.getElementById('zoneRight').addEventListener('click', next);
window.addEventListener('keydown', (e)=>{
  if(['ArrowRight',' ','PageDown'].includes(e.key)){ e.preventDefault(); next(); }
  else if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); prev(); }
});

buildDots();
render(true);
</script>
</body>
