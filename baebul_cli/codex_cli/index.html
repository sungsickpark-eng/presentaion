<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>날씨 알림</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef4f8;
      --panel: #ffffff;
      --text: #1d2733;
      --muted: #677485;
      --line: #d7e1ea;
      --accent: #1677c7;
      --rain: #2764b0;
      --hot: #c7502b;
      --cold: #3b6fb6;
      --wind: #5c6877;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(255,255,255,.82), rgba(238,244,248,.66)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80") center / cover fixed;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(215, 225, 234, .9);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(28, 45, 62, .16);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    header {
      padding: 28px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      min-height: 42px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      filter: brightness(.95);
    }

    button:disabled {
      cursor: wait;
      opacity: .72;
    }

    .content {
      padding: 28px;
      display: grid;
      gap: 18px;
    }

    .weather {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
    }

    .metric {
      padding: 18px;
      border-right: 1px solid var(--line);
      min-width: 0;
    }

    .metric:last-child {
      border-right: 0;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      display: block;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .alerts {
      display: grid;
      gap: 10px;
    }

    .alert {
      border-left: 5px solid var(--accent);
      background: #f6f9fc;
      border-radius: 6px;
      padding: 14px 16px;
      line-height: 1.55;
    }

    .alert.rain {
      border-color: var(--rain);
    }

    .alert.hot {
      border-color: var(--hot);
    }

    .alert.cold {
      border-color: var(--cold);
    }

    .alert.wind {
      border-color: var(--wind);
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      background: rgba(255, 255, 255, .74);
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
        place-items: start center;
      }

      header {
        padding: 22px;
        display: grid;
      }

      button {
        width: 100%;
      }

      .content {
        padding: 22px;
      }

      .weather {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric:nth-child(2) {
        border-right: 0;
      }

      .metric:nth-child(-n + 2) {
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>날씨 알림</h1>
        <p>현재 위치의 날씨를 확인하고 필요한 준비물을 알려드립니다.</p>
      </div>
      <button id="loadWeather" type="button">현재 날씨 확인</button>
    </header>

    <section class="content" aria-live="polite">
      <div class="status" id="status">버튼을 눌러 날씨 정보를 불러오세요.</div>

      <div class="weather" id="weather" hidden>
        <div class="metric">
          <span class="label">기온</span>
          <span class="value" id="temperature">-</span>
        </div>
        <div class="metric">
          <span class="label">체감</span>
          <span class="value" id="feelsLike">-</span>
        </div>
        <div class="metric">
          <span class="label">강수 확률</span>
          <span class="value" id="rainChance">-</span>
        </div>
        <div class="metric">
          <span class="label">풍속</span>
          <span class="value" id="windSpeed">-</span>
        </div>
      </div>

      <div class="alerts" id="alerts">
        <div class="empty">아직 표시할 알림이 없습니다.</div>
      </div>
    </section>
  </main>

  <script>
    const button = document.querySelector("#loadWeather");
    const statusText = document.querySelector("#status");
    const weatherPanel = document.querySelector("#weather");
    const alerts = document.querySelector("#alerts");

    const fields = {
      temperature: document.querySelector("#temperature"),
      feelsLike: document.querySelector("#feelsLike"),
      rainChance: document.querySelector("#rainChance"),
      windSpeed: document.querySelector("#windSpeed")
    };

    button.addEventListener("click", loadWeather);

    async function loadWeather() {
      button.disabled = true;
      statusText.textContent = "위치 정보를 확인하는 중입니다...";

      try {
        const position = await getPosition();
        const weather = await fetchWeather(position.coords.latitude, position.coords.longitude);
        renderWeather(weather);
        statusText.textContent = `업데이트: ${new Date().toLocaleTimeString("ko-KR", {
          hour: "2-digit",
          minute: "2-digit"
        })}`;
      } catch (error) {
        statusText.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    }

    function getPosition() {
      if (!navigator.geolocation) {
        return Promise.reject(new Error("이 브라우저는 위치 확인을 지원하지 않습니다."));
      }

      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, () => {
          reject(new Error("위치 권한이 필요합니다. 브라우저에서 위치 허용 후 다시 시도하세요."));
        }, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 300000
        });
      });
    }

    async function fetchWeather(latitude, longitude) {
      statusText.textContent = "날씨 정보를 불러오는 중입니다...";

      const params = new URLSearchParams({
        latitude,
        longitude,
        current: "temperature_2m,apparent_temperature,precipitation,wind_speed_10m",
        hourly: "precipitation_probability",
        forecast_days: "1",
        timezone: "auto"
      });

      const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!response.ok) {
        throw new Error("날씨 정보를 가져오지 못했습니다. 잠시 후 다시 시도하세요.");
      }

      return response.json();
    }

    function renderWeather(data) {
      const current = data.current;
      const hourly = data.hourly;
      const rainChance = getCurrentRainChance(hourly, current.time);
      const alertItems = makeAlerts(current, rainChance);

      fields.temperature.textContent = `${Math.round(current.temperature_2m)}°C`;
      fields.feelsLike.textContent = `${Math.round(current.apparent_temperature)}°C`;
      fields.rainChance.textContent = rainChance === null ? "확인 중" : `${rainChance}%`;
      fields.windSpeed.textContent = `${Math.round(current.wind_speed_10m)}km/h`;
      weatherPanel.hidden = false;

      alerts.innerHTML = "";
      if (alertItems.length === 0) {
        alerts.innerHTML = `<div class="alert">현재는 특별한 날씨 알림이 없습니다.</div>`;
        return;
      }

      for (const item of alertItems) {
        const node = document.createElement("div");
        node.className = `alert ${item.type}`;
        node.textContent = item.message;
        alerts.appendChild(node);
      }
    }

    function getCurrentRainChance(hourly, currentTime) {
      if (!hourly || !hourly.time || !hourly.precipitation_probability) {
        return null;
      }

      const currentHour = currentTime.slice(0, 13);
      const index = hourly.time.findIndex((time) => time.startsWith(currentHour));
      return index >= 0 ? hourly.precipitation_probability[index] : null;
    }

    function makeAlerts(current, rainChance) {
      const items = [];

      if (rainChance !== null && rainChance >= 50) {
        items.push({
          type: "rain",
          message: "비가 올 가능성이 높습니다. 우산을 챙기세요."
        });
      }

      if (current.apparent_temperature >= 30) {
        items.push({
          type: "hot",
          message: "체감 온도가 높습니다. 물을 자주 마시고 장시간 야외 활동을 줄이세요."
        });
      }

      if (current.apparent_temperature <= 5) {
        items.push({
          type: "cold",
          message: "체감 온도가 낮습니다. 외출 전 따뜻한 겉옷을 준비하세요."
        });
      }

      if (current.wind_speed_10m >= 35) {
        items.push({
          type: "wind",
          message: "바람이 강합니다. 접이식 우산이나 가벼운 물건 관리에 주의하세요."
        });
      }

      if (current.precipitation > 0) {
        items.push({
          type: "rain",
          message: "현재 비나 눈이 관측되고 있습니다. 이동 시 미끄럼에 주의하세요."
        });
      }

      return items;
    }
  </script>
</body>
</html>
