<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03. 원스톱 바이브 코딩 — 문장별 발표</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1A1B3A;--navy-2:#23254d;--cream:#FFF8EF;--cream-2:#FDEFE0;
    --coral:#FF6B5C;--mint:#3DD6A0;--gold:#FFC247;--ink:#2A2B45;--muted:#6B6C82;
    --line:rgba(26,27,58,.12);--shadow:0 18px 50px -18px rgba(26,27,58,.35);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Pretendard',system-ui,sans-serif;background:#0e0f24;color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
  .deck{position:relative;width:100vw;height:100vh}

  .slide{position:absolute;inset:0;display:none;flex-direction:column;padding:clamp(28px,4.5vw,68px);overflow:hidden}
  .slide.active{display:flex}
  .slide.enter-next,.slide.enter-prev{z-index:2}
  .slide.leave-next,.slide.leave-prev{z-index:1}

  /* directional slide enter/leave */
  .slide.enter-next{animation:enterNext .55s cubic-bezier(.16,.84,.28,1) both}
  .slide.enter-prev{animation:enterPrev .55s cubic-bezier(.16,.84,.28,1) both}
  .slide.leave-next{display:flex;animation:leaveNext .4s cubic-bezier(.5,0,.75,.3) both}
  .slide.leave-prev{display:flex;animation:leavePrev .4s cubic-bezier(.5,0,.75,.3) both}
  @keyframes enterNext{from{opacity:0;transform:translateX(60px) scale(.97)}to{opacity:1;transform:translateX(0) scale(1)}}
  @keyframes enterPrev{from{opacity:0;transform:translateX(-60px) scale(.97)}to{opacity:1;transform:translateX(0) scale(1)}}
  @keyframes leaveNext{from{opacity:1;transform:translateX(0) scale(1)}to{opacity:0;transform:translateX(-50px) scale(.97)}}
  @keyframes leavePrev{from{opacity:1;transform:translateX(0) scale(1)}to{opacity:0;transform:translateX(50px) scale(.97)}}

  /* staggered reveal of inner blocks */
  .slide.active .stage > *{opacity:0;animation:popUp .5s cubic-bezier(.18,.8,.28,1) forwards}
  .slide.active .stage > *:nth-child(1){animation-delay:.12s}
  .slide.active .stage > *:nth-child(2){animation-delay:.22s}
  .slide.active .stage > *:nth-child(3){animation-delay:.32s}
  .slide.active .stage > *:nth-child(4){animation-delay:.42s}
  .slide.active .stage > *:nth-child(5){animation-delay:.52s}
  @keyframes popUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

  /* background art drifts in */
  .slide.active .bg-art{animation:artIn .8s cubic-bezier(.16,.84,.28,1) both}
  @keyframes artIn{from{opacity:0;transform:translateY(-50%) translateX(30px) rotate(6deg) scale(.9)}to{opacity:.5;transform:translateY(-50%) translateX(0) rotate(0) scale(1)}}
  .slide.active .bg-tr,.slide.active .bg-br,.slide.active .bg-bl{animation:artInCorner .8s cubic-bezier(.16,.84,.28,1) both}
  @keyframes artInCorner{from{opacity:0;transform:translateX(36px) rotate(8deg) scale(.88)}to{opacity:.5;transform:translateX(0) rotate(0) scale(1)}}

  .t-cream{background:radial-gradient(120% 120% at 80% 0%,var(--cream-2) 0%,var(--cream) 55%)}
  .t-navy{background:radial-gradient(130% 120% at 15% 10%,var(--navy-2) 0%,var(--navy) 60%);color:var(--cream)}
  .t-coral{background:linear-gradient(135deg,#FF7E70 0%,var(--coral) 60%,#ff5848 100%);color:#fff}
  .t-mint{background:linear-gradient(150deg,#46e0aa 0%,#2fc78f 70%);color:#08322390}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex:none}
  .chapter{display:flex;align-items:center;gap:11px;font-weight:800;font-size:clamp(12px,1.3vw,15px);letter-spacing:.02em}
  .chip{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;padding:5px 11px;border-radius:999px;background:var(--ink);color:var(--cream);white-space:nowrap}
  .t-navy .chip{background:var(--gold);color:var(--navy)}
  .t-coral .chip,.t-mint .chip{background:#fff;color:var(--coral)}
  .timecode{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:clamp(11px,1.2vw,14px);opacity:.65}

  /* center stage — one sentence */
  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;gap:clamp(14px,2.4vh,30px);max-width:1100px;width:100%;margin:0 auto}
  .eyebrow{font-weight:800;font-size:clamp(13px,1.5vw,18px);letter-spacing:.03em;color:var(--coral);display:flex;align-items:center;gap:9px}
  .t-navy .eyebrow{color:var(--gold)}.t-coral .eyebrow,.t-mint .eyebrow{color:#fff;opacity:.92}

  .scene{display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:clamp(11px,1.3vw,14px);font-weight:700;background:var(--ink);color:var(--cream);padding:9px 15px;border-radius:11px;align-self:flex-start;opacity:.9}
  .t-navy .scene{background:rgba(255,255,255,.1)}.t-coral .scene,.t-mint .scene{background:rgba(0,0,0,.2)}

  .say{font-size:clamp(30px,5vw,62px);line-height:1.28;font-weight:800;letter-spacing:-.02em}
  .say .hl{color:var(--coral)}
  .t-navy .say .hl{color:var(--gold)}
  .say .hl2{color:var(--mint)}
  .t-coral .say .hl,.t-coral .say .hl2,.t-mint .say .hl,.t-mint .say .hl2{color:#fff;text-decoration:underline;text-decoration-color:rgba(255,255,255,.5);text-underline-offset:6px}
  .big{font-size:clamp(40px,7.5vw,104px);line-height:1.08;font-weight:900;letter-spacing:-.03em}
  .sub{font-size:clamp(16px,2vw,25px);line-height:1.55;font-weight:500;color:var(--muted)}
  .t-navy .sub{color:#cfd0e8}.t-coral .sub,.t-mint .sub{color:#fff;opacity:.9}

  /* title bits */
  .hero-num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:clamp(56px,11vw,150px);line-height:.85;color:var(--coral)}
  .tags{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px}
  .tag{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:7px 15px;border-radius:999px;font-weight:700;font-size:clamp(12px,1.4vw,15px)}

  /* terminal/browser inline mock (compact) */
  .mockrow{display:flex;gap:16px;flex-wrap:wrap}
  .mock{border-radius:14px;overflow:hidden;box-shadow:var(--shadow);min-width:240px;flex:1}
  .mock .bar{display:flex;gap:6px;padding:10px 12px;align-items:center}
  .dot{width:11px;height:11px;border-radius:50%}
  .term{background:#0c0d1f}.term .bar{background:#16172e}
  .term .scr{padding:15px;font-family:'JetBrains Mono',monospace;font-size:clamp(11px,1.2vw,14px);line-height:1.7;color:#ff6b5c}
  .term .scr .g{color:#5b5d80}
  .brow{background:#fff;border:1px solid var(--line)}.brow .bar{background:var(--cream-2)}
  .brow .url{flex:1;background:#fff;border-radius:6px;padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-left:6px}
  .brow .scr{padding:20px;text-align:center}
  .brow .scr .b{font-size:clamp(20px,2.6vw,32px);font-weight:900;color:var(--navy)}
  .brow .scr .s{color:var(--muted);font-weight:600;margin-top:5px;font-size:13px}

  /* tool emblem */
  .emblem{font-size:clamp(54px,9vw,120px);line-height:1;display:inline-block}
  .emblem-row{display:flex;gap:clamp(10px,2vw,22px);align-items:center}
  .emblem-row .e{font-size:clamp(40px,7vw,92px);line-height:1}

  /* big background watermark illustration */
  .bg-art{position:absolute;pointer-events:none;z-index:0;opacity:.5}
  .bg-tr{top:-6%;right:-4%;width:clamp(240px,34vw,520px)}
  .bg-br{bottom:-8%;right:2%;width:clamp(200px,26vw,400px)}
  .bg-bl{bottom:-6%;left:-4%;width:clamp(220px,28vw,440px)}
  .bg-cr{top:50%;right:3%;transform:translateY(-50%);width:clamp(200px,24vw,380px)}
  .stage,.topbar,.footer{position:relative;z-index:1}

  /* floating mini emojis sprinkled */
  .sprinkle{position:absolute;z-index:0;font-size:clamp(22px,3vw,46px);opacity:.85;pointer-events:none}

  /* inline accent icon before sentence */
  .accent-ico{width:clamp(44px,6vw,76px);height:clamp(44px,6vw,76px);display:inline-grid;place-items:center;border-radius:18px;background:rgba(255,107,92,.12);margin-bottom:6px}
  .t-navy .accent-ico{background:rgba(255,194,71,.16)}
  .t-coral .accent-ico,.t-mint .accent-ico{background:rgba(255,255,255,.2)}

  .pill-row{display:flex;gap:10px;flex-wrap:wrap}
  .pill{font-size:clamp(13px,1.5vw,18px);font-weight:700;padding:9px 17px;border-radius:999px;display:inline-flex;align-items:center;gap:7px}
  .pill.pro{background:#e3f9f0;color:#159e6e;border:1px solid #b6ecd6}
  .pill.con{background:#ffe9e5;color:#d9544a;border:1px solid #ffc9c1}

  /* prompt code */
  .prompt{font-family:'JetBrains Mono',monospace;font-size:clamp(15px,2.1vw,26px);line-height:1.5;background:var(--navy);color:var(--mint);padding:clamp(16px,2.2vw,28px);border-radius:16px;font-weight:400;box-shadow:var(--shadow)}
  .t-navy .prompt{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12)}

  /* step number badge */
  .stepno{display:inline-flex;align-items:center;gap:14px;font-weight:800;font-size:clamp(14px,1.6vw,19px);color:var(--muted)}
  .stepno .n{width:clamp(48px,6vw,72px);height:clamp(48px,6vw,72px);border-radius:50%;background:var(--navy);color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:700;display:grid;place-items:center;font-size:clamp(22px,3vw,38px)}

  /* footer */
  .footer{display:flex;align-items:center;justify-content:space-between;gap:16px;flex:none;padding-top:16px;font-size:12px;font-weight:700}
  .brand{display:flex;align-items:center;gap:8px;opacity:.82}
  .brand .logo{width:24px;height:24px;border-radius:7px;background:var(--coral);color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px}
  .t-coral .brand .logo,.t-mint .brand .logo{background:#fff;color:var(--coral)}
  .progress{flex:1;max-width:280px;height:5px;border-radius:999px;background:rgba(0,0,0,.12);overflow:hidden;margin:0 8px}
  .t-navy .progress,.t-coral .progress,.t-mint .progress{background:rgba(255,255,255,.22)}
  .progress i{display:block;height:100%;background:var(--coral);border-radius:999px;transition:width .4s ease}
  .t-navy .progress i{background:var(--gold)}.t-coral .progress i,.t-mint .progress i{background:#fff}

  /* nav */
  .nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:50}
  .nav button{background:rgba(255,255,255,.92);border:1px solid var(--line);width:44px;height:44px;border-radius:50%;font-size:19px;cursor:pointer;box-shadow:var(--shadow);color:var(--navy);transition:.15s;display:grid;place-items:center}
  .nav button:hover{transform:translateY(-2px);background:#fff}
  .nav button:active{transform:translateY(0) scale(.9)}
  .nav .count{align-self:center;font-family:'JetBrains Mono',monospace;font-weight:700;color:#fff;font-size:13px;background:rgba(0,0,0,.45);padding:0 14px;height:44px;display:grid;place-items:center;border-radius:999px}

  @media (max-width:760px){.mockrow{flex-direction:column}}
  @media (prefers-reduced-motion:reduce){.slide,.slide.active,.slide.active .stage>*,.slide.active .bg-art,.slide.enter-next,.slide.enter-prev{animation:none!important;opacity:1!important;transform:none!important}}
</style>
</head>
<body>
<div class="deck" id="deck"></div>

<div class="nav">
  <button id="prev" aria-label="이전">‹</button>
  <span class="count" id="count">1 / 1</span>
  <button id="next" aria-label="다음">›</button>
</div>

const deck=document.getElementById('deck');
const total=S.length;
S.forEach((s,idx)=>{
  const el=document.createElement('section');
  el.className=`slide ${s.theme}`;
  el.innerHTML=`
    ${s.art?ART[s.art]||'':''}
    <div class="topbar">
      <div class="chapter"><span class="chip">${s.chip}</span></div>
    </div>
    <div class="stage">
      ${s.eyebrow?`<div class="eyebrow">${s.eyebrow}</div>`:''}
      ${s.scene?`<div class="scene">🎬 ${s.scene}</div>`:''}
      ${s.html}
    </div>
    <div class="footer">
      <div class="brand"><span class="logo">배</span> 배불뚝이 코딩</div>
      <div class="progress"><i style="width:${((idx+1)/total*100).toFixed(1)}%"></i></div>
      <div class="timecode">${String(idx+1).padStart(2,'0')} / ${total}</div>
    </div>`;
  deck.appendChild(el);
});

const slides=[...document.querySelectorAll('.slide')];
let i=0, animating=false;
const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
const ENTER_MS=560, LEAVE_MS=360;

function setCount(n){document.getElementById('count').textContent=`${n+1} / ${total}`;}

function show(idx){
  slides.forEach((s,k)=>{s.className=s.className.replace(/\b(enter|leave)-(next|prev)\b/g,'').trim();s.classList.toggle('active',k===idx);});
  setCount(idx);
}

function go(target,dir){
  target=Math.max(0,Math.min(total-1,target));
  if(target===i||animating)return;
  if(reduce){i=target;show(i);return;}
  animating=true;
  const cur=slides[i], nxt=slides[target];
  const enterCls=dir>0?'enter-next':'enter-prev';
  const leaveCls=dir>0?'leave-next':'leave-prev';
  // start incoming
  nxt.classList.remove('enter-next','enter-prev','leave-next','leave-prev');
  nxt.classList.add('active',enterCls);
  // start outgoing
  cur.classList.add(leaveCls);
  setCount(target);
  setTimeout(()=>{
    cur.classList.remove('active','leave-next','leave-prev');
    nxt.classList.remove(enterCls);
    i=target;
    animating=false;
  },ENTER_MS);
}

function next(){go(i+1,1);}
function prev(){go(i-1,-1);}

document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{
  if(['ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();next();}
  if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();prev();}
  if(e.key==='Home')go(0,-1);if(e.key==='End')go(total-1,1);
});
let sx=null;
document.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{if(sx===null)return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50){dx<0?next():prev();}sx=null;},{passive:true});
show(0);
</script>
