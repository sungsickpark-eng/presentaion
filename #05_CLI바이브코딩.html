<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>배불뚝이 코딩 05 — 바이브코딩의 진짜 엔진, CLI로</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080a0d;
    --bg-2:#0d1117;
    --panel:#11161d;
    --ink:#eef2f6;
    --dim:#8b96a3;
    --dim-2:#525d68;
    --line: rgba(255,255,255,.08);

    --claude:#7dd3fc;
    --claude-soft: rgba(125,211,252,.14);
    --codex:#fbbf24;
    --codex-soft: rgba(251,191,36,.14);
    --anti:#c084fc;
    --anti-soft: rgba(192,132,252,.14);
    --neutral:#5eead4;
    --neutral-soft: rgba(94,234,212,.14);

    --accent: var(--neutral);
    --accent-soft: var(--neutral-soft);

    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --kr: 'Noto Sans KR', sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--kr);
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}
  }

  /* ---------- scanline / crt texture ---------- */
  .crt{
    position:fixed; inset:0; pointer-events:none; z-index:50; mix-blend-mode:overlay; opacity:.5;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.035) 0px, rgba(255,255,255,.035) 1px, transparent 1px, transparent 3px);
  }
  .vignette{
    position:fixed; inset:0; pointer-events:none; z-index:49;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.55) 100%);
  }

  /* ---------- boot screen ---------- */
  #boot{
    position:fixed; inset:0; z-index:100; background:#000;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    font-family:var(--mono); color:var(--neutral);
    cursor:pointer;
  }
  #boot .boot-lines{ font-size:22px; line-height:1.9; text-align:left; max-width:880px; width:90%; }
  #boot .boot-lines div{ opacity:0; animation:appear .05s forwards; }
  #boot .cursor-blink{ display:inline-block; width:14px; height:24px; background:var(--neutral); margin-left:4px; animation:blink 1s steps(1) infinite; vertical-align:-4px; }
  @keyframes appear{ to{ opacity:1; } }
  @keyframes blink{ 50%{ opacity:0; } }
  #boot .start-hint{
    margin-top:48px; font-size:19px; color:var(--dim); letter-spacing:.06em;
    padding:16px 30px; border:1px solid var(--line); border-radius:999px;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:.55;} 50%{opacity:1;} }
  #boot.hide{ animation: fadeOut .5s ease forwards; pointer-events:none; }
  @keyframes fadeOut{ to{ opacity:0; visibility:hidden; } }

  /* ---------- app shell (fake terminal window) : fixed 1920x1080 canvas, auto-scaled ---------- */
  #stageOuter{ position:fixed; inset:0; background:#000; overflow:hidden; }
  #app{
    position:absolute; top:50%; left:50%;
    width:1920px; height:1080px;
    transform: translate(-50%,-50%) scale(1);
    transform-origin: center center;
    display:flex; align-items:center; justify-content:center;
    padding: 40px;
  }
  #app.hidden{ display:none; }

  .frame{
    width:1840px;
    height:1000px;
    background:linear-gradient(180deg, var(--panel), var(--bg-2));
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.02) inset;
    display:flex; flex-direction:column; overflow:hidden;
    position:relative;
    transition: box-shadow .4s ease;
  }
  .frame::before{
    content:''; position:absolute; inset:0; pointer-events:none; border-radius:16px;
    box-shadow: 0 0 60px 6px var(--accent-soft) inset;
    transition: box-shadow .6s ease;
  }

  .titlebar{
    display:flex; align-items:center; gap:20px;
    padding:20px 28px; border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.015);
    flex-shrink:0;
  }
  .tl{ display:flex; gap:10px; }
  .tl span{ width:16px; height:16px; border-radius:50%; display:block; }
  .tl span:nth-child(1){ background:#ff5f56; }
  .tl span:nth-child(2){ background:#ffbd2e; }
  .tl span:nth-child(3){ background:#27c93f; }
  .title-text{
    font-family:var(--mono); font-size:19px; color:var(--dim); letter-spacing:.02em;
    flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .title-text b{ color:var(--accent); font-weight:700; transition:color .5s ease; }
  .counter{ font-family:var(--mono); font-size:17px; color:var(--dim-2); flex-shrink:0; min-width:110px; text-align:right;}

  /* ---------- chapter progress ---------- */
  .progress-track{
    display:flex; gap:5px; padding:16px 26px 12px; flex-shrink:0;
  }
  .dot{
    flex:1; height:8px; border-radius:4px; background:rgba(255,255,255,.08); cursor:pointer; position:relative; overflow:hidden;
    transition: background .3s ease;
  }
  .dot .fill{ position:absolute; inset:0; width:0%; background:var(--accent); border-radius:3px; transition: width .25s linear, background .5s ease; }
  .dot.done .fill{ width:100%; }
  .dot.current{ background: rgba(255,255,255,.14); }

  /* ---------- stage ---------- */
  .stage{ position:relative; flex:1; overflow:hidden; }
  .scene{ position:absolute; inset:0; }

  .grid-bg{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size: 34px 34px;
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 40%, transparent 85%);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 40%, transparent 85%);
  }
  .glow{
    position:absolute; width:640px; height:640px;
    background: radial-gradient(circle, var(--accent-soft), transparent 65%);
    top:50%; left:50%; transform:translate(-50%,-58%);
    filter: blur(4px);
    transition: background .6s ease;
  }

  .mini-term{
    position:absolute; top:11%; left:50%; transform:translateX(-50%);
    width:760px; max-width:70%;
    background:rgba(6,8,11,.72);
    border:1px solid var(--line);
    border-radius:14px;
    padding:22px 26px 24px;
    font-family:var(--mono); font-size:18px; color:var(--neutral);
    box-shadow: 0 20px 50px rgba(0,0,0,.4);
    backdrop-filter: blur(6px);
  }
  .mini-term .mt-bar{ display:flex; gap:8px; margin-bottom:14px; }
  .mini-term .mt-bar span{ width:12px; height:12px; border-radius:50%; background:rgba(255,255,255,.18); }
  .mini-term .mt-line{ opacity:.92; margin:5px 0; color: var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mini-term .mt-line::before{ content:'❯ '; color:var(--dim-2); }
  .mini-term .mt-cursor{ display:inline-block; width:10px; height:19px; background:var(--accent); animation:blink 1s steps(1) infinite; vertical-align:-3px; margin-left:2px; }

  .float-emoji{
    position:absolute; font-size:70px; filter: drop-shadow(0 8px 18px rgba(0,0,0,.5));
    animation: float 5.5s ease-in-out infinite;
  }
  .float-emoji.e1{ top:60%; left:14%; font-size:88px; animation-delay:.1s; }
  .float-emoji.e2{ top:16%; right:11%; font-size:64px; animation-delay:1.1s; }
  .float-emoji.e3{ bottom:16%; right:18%; font-size:76px; animation-delay:2s; }
  .float-emoji.e4{ bottom:32%; left:8%; font-size:54px; animation-delay:.6s; }
  @keyframes float{ 0%,100%{ transform:translateY(0) rotate(-2deg); } 50%{ transform:translateY(-20px) rotate(2deg); } }

  .scene-icon{
    position:absolute; left:50%; top:53%; transform:translate(-50%,-50%);
    font-size:360px; line-height:1; opacity:.9;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,.55));
    animation: iconPulse 4s ease-in-out infinite;
  }
  .scene-icon.multi{
    display:flex; gap:56px; align-items:center; justify-content:center; font-size:260px;
  }
  @keyframes iconPulse{ 0%,100%{ transform:translate(-50%,-50%) scale(1); } 50%{ transform:translate(-50%,-50%) scale(1.045); } }

  .dual-icon{
    position:absolute; top:53%; font-size:260px; line-height:1;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,.55));
    display:none;
  }
  .dual-icon.show{ display:block; }
  .dual-icon.left{ left:39%; transform:translate(-50%,-50%); animation: slideLeftIn .6s cubic-bezier(.2,.9,.25,1) both; }
  .dual-icon.right{ left:61%; transform:translate(-50%,-50%); animation: slideRightIn .6s cubic-bezier(.2,.9,.25,1) .18s both; }
  @keyframes slideLeftIn{ from{ transform:translate(-50%,-50%) translateX(140px); opacity:0; } to{ transform:translate(-50%,-50%) translateX(0); opacity:1; } }
  @keyframes slideRightIn{ from{ transform:translate(-50%,-50%) translateX(-140px); opacity:0; } to{ transform:translate(-50%,-50%) translateX(0); opacity:1; } }

  .scene-logo{
    position:absolute; top:53%; left:50%; transform:translate(-50%,-50%);
    width:340px; height:340px; border-radius:76px; object-fit:cover;
    box-shadow:0 24px 60px rgba(0,0,0,.55);
    display:none;
  }
  .scene-logo.show{ display:block; animation: tripleAppear .5s ease both; }

  .triple-icon-wrap{
    position:absolute; top:53%; left:50%; transform:translate(-50%,-50%);
    display:none; gap:64px; align-items:center; justify-content:center;
  }
  .triple-icon-wrap.show{ display:flex; animation: tripleAppear .5s ease both; }
  .triple-icon-wrap img{
    width:220px; height:220px; border-radius:50px; object-fit:cover;
    box-shadow:0 24px 50px rgba(0,0,0,.55);
  }
  @keyframes tripleAppear{ from{ opacity:0; transform:translate(-50%,-50%) scale(.88); } to{ opacity:1; transform:translate(-50%,-50%) scale(1); } }

  /* ---------- nav click zones ---------- */
  .nav-zone{
    position:absolute; top:0; bottom:0; width:32%; background:transparent; border:none; cursor:pointer; z-index:5;
    -webkit-tap-highlight-color:transparent;
  }
  .nav-zone.left{ left:0; }
  .nav-zone.right{ right:0; }

  /* ---------- caption card (card-news style, bottom center) ---------- */
  .card-wrap{
    position:absolute; left:50%; bottom:28px; transform:translateX(-50%);
    width:1020px; max-width:78%; z-index:10; display:flex; flex-direction:column; align-items:center; gap:12px;
    pointer-events:none;
  }
  .chapter-chip{
    font-family:var(--mono); font-size:16px; letter-spacing:.08em; color:var(--accent);
    background: rgba(0,0,0,.4); border:1px solid var(--line); padding:8px 18px; border-radius:999px;
    transition: color .5s ease;
  }
  .caption-card{
    width:100%;
    background: rgba(10,13,17,.86);
    border:1px solid var(--line);
    border-left:6px solid var(--accent);
    border-radius:18px;
    padding:28px 34px;
    backdrop-filter: blur(10px);
    box-shadow: 0 18px 40px rgba(0,0,0,.5);
    display:flex; align-items:flex-start; gap:20px;
    animation: cardIn .38s cubic-bezier(.2,.9,.25,1);
    transition: border-color .5s ease;
  }
  .caption-card.tag-line .sub{
    display:block; font-family:var(--mono); font-size:15px; color:var(--accent); margin-bottom:8px; letter-spacing:.03em;
  }
  @keyframes cardIn{ from{ opacity:0; transform: translateY(14px) scale(.985); } to{ opacity:1; transform:none; } }
  .caption-card .emoji{ font-size:42px; flex-shrink:0; margin-top:1px; }
  .caption-text{ margin:0; font-size:28px; line-height:1.55; font-weight:500; color:var(--ink); }
  .caption-text b{ color:var(--accent); }

  /* ---------- footer controls ---------- */
  .controls{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:18px 26px; border-top:1px solid var(--line); background:rgba(255,255,255,.015);
    flex-shrink:0;
  }
  .btn-nav{
    font-family:var(--mono); font-size:18px; color:var(--ink); background:rgba(255,255,255,.05);
    border:1px solid var(--line); padding:13px 24px; border-radius:11px; cursor:pointer;
    transition: background .2s ease, transform .15s ease;
  }
  .btn-nav:hover{ background:rgba(255,255,255,.1); }
  .btn-nav:active{ transform: scale(.96); }
  .btn-nav:disabled{ opacity:.3; cursor:default; }

  .walkie{ display:flex; gap:10px; }
  .ch{
    font-family:var(--mono); font-size:15px; letter-spacing:.02em; color:var(--dim);
    background:rgba(255,255,255,.04); border:1px solid var(--line); padding:12px 16px; border-radius:10px; cursor:pointer;
    display:flex; align-items:center; gap:9px; transition: all .25s ease;
  }
  .ch .dotlight{ width:9px; height:9px; border-radius:50%; background:var(--dim-2); transition: all .3s ease; }
  .ch:hover{ color:var(--ink); }
  .ch-claude.active{ color:var(--claude); border-color: var(--claude); background:var(--claude-soft); }
  .ch-claude.active .dotlight{ background:var(--claude); box-shadow:0 0 8px var(--claude); }
  .ch-codex.active{ color:var(--codex); border-color: var(--codex); background:var(--codex-soft); }
  .ch-codex.active .dotlight{ background:var(--codex); box-shadow:0 0 8px var(--codex); }
  .ch-anti.active{ color:var(--anti); border-color: var(--anti); background:var(--anti-soft); }
  .ch-anti.active .dotlight{ background:var(--anti); box-shadow:0 0 8px var(--anti); }

  /* fixed 1920x1080 design canvas: no responsive breakpoints — #stageOuter scales the whole canvas uniformly via JS instead */
</style>
</head>
<body>

<div id="stageOuter">
<div class="crt"></div>
<div class="vignette"></div>

<div id="boot">
  <div class="boot-lines" id="bootLines"></div>
  <div class="start-hint" id="startHint" style="opacity:0;">클릭 또는 아무 키나 눌러서 시작 →</div>
</div>

<div id="app" class="hidden">
  <div class="frame" id="frame">
    <div class="titlebar">
      <div class="tl"><span></span><span></span><span></span></div>
      <div class="title-text">root@baebulcoding:~$ <b id="titleAccent">episode_05</b> — 바이브코딩의 진짜 엔진, CLI로</div>
      <div class="counter" id="counter">001 / 001</div>
    </div>

    <div class="progress-track" id="progressTrack"></div>

    <div class="stage" id="stage">
      <div class="scene" id="scene">
        <div class="glow" id="glow"></div>
        <div class="grid-bg"></div>
        <div class="scene-icon" id="sceneIcon">💻</div>
        <img class="scene-logo" id="sceneLogo" alt="program logo">
        <div class="dual-icon left" id="dualLeft"></div>
        <div class="dual-icon right" id="dualRight"></div>
        <div class="triple-icon-wrap" id="tripleWrap">
          <img id="tripleImg1" alt="Claude">
          <img id="tripleImg2" alt="Codex">
          <img id="tripleImg3" alt="Antigravity">
        </div>
        <div class="float-emoji e1" id="fe1">📻</div>
        <div class="float-emoji e2" id="fe2">✨</div>
        <div class="float-emoji e3" id="fe3">🐕</div>
        <div class="float-emoji e4" id="fe4">⌨️</div>
        <div class="mini-term" id="miniTerm">
          <div class="mt-bar"><span></span><span></span><span></span></div>
          <div id="mtLines"></div>
        </div>
      </div>

      <button class="nav-zone left" id="prevZone" aria-label="이전 카드"></button>
      <button class="nav-zone right" id="nextZone" aria-label="다음 카드"></button>

      <div class="card-wrap">
        <div class="chapter-chip" id="chapterChip">인트로</div>
        <div class="caption-card" id="captionCard">
          <span class="emoji" id="cardEmoji">⚠️</span>
          <p class="caption-text" id="cardText">로딩 중...</p>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-nav" id="btnPrev">◀ 이전</button>
      <div class="walkie" id="walkie">
        <button class="ch ch-claude" data-jump="claude"><span class="dotlight"></span>CH1 클로드</button>
        <button class="ch ch-codex" data-jump="codex"><span class="dotlight"></span>CH2 코덱스</button>
        <button class="ch ch-anti" data-jump="antigravity"><span class="dotlight"></span>CH3 안티그래비티</button>
      </div>
      <button class="btn-nav" id="btnNext">다음 ▶</button>
    </div>
  </div>
</div>
</div><!-- /#stageOuter -->

/* ================= STATE ================= */
let idx = 0;
const total = CARDS.length;

/* ================= DOM ================= */
const els = {
  frame: document.getElementById('frame'),
  stage: document.getElementById('stage'),
  glow: document.getElementById('glow'),
  sceneIcon: document.getElementById('sceneIcon'),
  sceneLogo: document.getElementById('sceneLogo'),
  dualLeft: document.getElementById('dualLeft'),
  dualRight: document.getElementById('dualRight'),
  tripleWrap: document.getElementById('tripleWrap'),
  tripleImgs: [document.getElementById('tripleImg1'), document.getElementById('tripleImg2'), document.getElementById('tripleImg3')],
  fe: [document.getElementById('fe1'),document.getElementById('fe2'),document.getElementById('fe3'),document.getElementById('fe4')],
  mtLines: document.getElementById('mtLines'),
  chapterChip: document.getElementById('chapterChip'),
  captionCard: document.getElementById('captionCard'),
  cardEmoji: document.getElementById('cardEmoji'),
  cardText: document.getElementById('cardText'),
  counter: document.getElementById('counter'),
  titleAccent: document.getElementById('titleAccent'),
  progressTrack: document.getElementById('progressTrack'),
  btnPrev: document.getElementById('btnPrev'),
  btnNext: document.getElementById('btnNext'),
  prevZone: document.getElementById('prevZone'),
  nextZone: document.getElementById('nextZone'),
  walkie: document.getElementById('walkie'),
};

/* build chapter dots */
SECTIONS.forEach((s,i)=>{
  const d = document.createElement('div');
  d.className = 'dot';
  d.dataset.sec = i;
  d.title = `${s.time} · ${s.title}`;
  d.innerHTML = '<span class="fill"></span>';
  d.addEventListener('click', ()=>{
    const firstIdx = CARDS.findIndex(c=>c.sec===i);
    if(firstIdx>-1){ idx = firstIdx; render(); }
  });
  els.progressTrack.appendChild(d);
});
const dotEls = [...els.progressTrack.children];

els.tripleImgs[0].src = LOGO_CLAUDE;
els.tripleImgs[1].src = LOGO_CODEX;
els.tripleImgs[2].src = LOGO_ANTIGRAVITY;

function render(){
  const card = CARDS[idx];
  const sec = SECTIONS[card.sec];
  const theme = THEME[sec.ch];

  // accent
  els.frame.style.setProperty('--accent', theme.color);
  els.frame.style.setProperty('--accent-soft', theme.soft);

  // scene
  if(card.triple){
    els.dualLeft.classList.remove('show');
    els.dualRight.classList.remove('show');
    els.sceneLogo.classList.remove('show');
    els.sceneIcon.style.display = 'none';
    els.tripleWrap.classList.add('show');
    // retrigger center-appear animation
    els.tripleWrap.style.animation = 'none';
    void els.tripleWrap.offsetWidth;
    els.tripleWrap.style.animation = '';
  } else if(card.dual){
    els.tripleWrap.classList.remove('show');
    els.sceneLogo.classList.remove('show');
    els.sceneIcon.classList.remove('multi');
    els.sceneIcon.style.display = 'none';
    els.dualLeft.textContent = card.dual.left;
    els.dualRight.textContent = card.dual.right;
    els.dualLeft.classList.add('show');
    els.dualRight.classList.add('show');
    // retrigger entrance animation
    [els.dualLeft, els.dualRight].forEach(el=>{
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
    });
  } else {
    els.tripleWrap.classList.remove('show');
    els.dualLeft.classList.remove('show');
    els.dualRight.classList.remove('show');

    const logoSrc = !card.icon && LOGO_MAP[sec.ch];
    if(logoSrc){
      els.sceneIcon.style.display = 'none';
      els.sceneLogo.src = logoSrc;
      els.sceneLogo.classList.add('show');
      // retrigger center-appear animation
      els.sceneLogo.style.animation = 'none';
      void els.sceneLogo.offsetWidth;
      els.sceneLogo.style.animation = '';
    } else {
      els.sceneLogo.classList.remove('show');
      els.sceneIcon.style.display = '';
      const iconStr = card.icon || sec.icon;
      if(iconStr.includes(' ')){
        els.sceneIcon.classList.add('multi');
        els.sceneIcon.innerHTML = iconStr.split(' ').map(s=>`<span>${s}</span>`).join('');
      } else {
        els.sceneIcon.classList.remove('multi');
        els.sceneIcon.textContent = iconStr;
      }
    }
  }
  sec.floats.forEach((em,i)=>{ if(els.fe[i]) els.fe[i].textContent = em; });
  els.mtLines.innerHTML = sec.term.map(l=>`<div class="mt-line">${escapeHtml(l)}</div>`).join('') + '<span class="mt-cursor"></span>';

  // chip + title
  els.chapterChip.textContent = sec.title;
  els.titleAccent.textContent = theme.name === 'NEUTRAL' ? 'episode_05' : theme.name.toLowerCase()+'_cli';

  // card
  els.cardEmoji.textContent = card.emoji;
  els.cardText.innerHTML = (card.sub ? `<span class="sub">${escapeHtml(card.sub)}</span>` : '') + escapeHtml(card.text);
  els.captionCard.classList.toggle('tag-line', !!card.sub);
  // retrigger entrance animation
  els.captionCard.style.animation = 'none';
  void els.captionCard.offsetWidth;
  els.captionCard.style.animation = '';

  // counter
  els.counter.textContent = String(idx+1).padStart(3,'0') + ' / ' + String(total).padStart(3,'0');

  // progress dots
  dotEls.forEach((d,i)=>{
    d.classList.toggle('done', i < card.sec);
    d.classList.toggle('current', i === card.sec);
    const fill = d.querySelector('.fill');
    if(i === card.sec){
      const secCards = CARDS.filter(c=>c.sec===i);
      const firstIdxOfSec = CARDS.findIndex(c=>c.sec===i);
      const posInSec = idx - firstIdxOfSec;
      const pct = ((posInSec+1) / secCards.length) * 100;
      fill.style.width = pct + '%';
      fill.style.background = theme.color;
    } else if(i < card.sec){
      fill.style.width = '100%';
    } else {
      fill.style.width = '0%';
    }
  });

  // walkie active states
  [...els.walkie.children].forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.jump === sec.ch);
  });

  // nav buttons disabled state
  els.btnPrev.disabled = idx === 0;
  els.btnNext.disabled = idx === total-1;
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function go(delta){
  const next = idx + delta;
  if(next < 0 || next >= total) return;
  idx = next;
  render();
}

function jumpToChannel(chKey){
  const firstIdx = CARDS.findIndex(c => SECTIONS[c.sec].ch === chKey);
  if(firstIdx > -1){ idx = firstIdx; render(); }
}

/* ================= EVENTS ================= */
els.btnPrev.addEventListener('click', ()=>go(-1));
els.btnNext.addEventListener('click', ()=>go(1));
els.prevZone.addEventListener('click', ()=>go(-1));
els.nextZone.addEventListener('click', ()=>go(1));
els.walkie.addEventListener('click', (e)=>{
  const btn = e.target.closest('.ch');
  if(btn) jumpToChannel(btn.dataset.jump);
});

document.addEventListener('keydown', (e)=>{
  if(document.getElementById('app').classList.contains('hidden')) return;
  if(e.key==='ArrowRight' || e.key===' '){ e.preventDefault(); go(1); }
  else if(e.key==='ArrowLeft'){ go(-1); }
  else if(e.key==='Home'){ idx=0; render(); }
  else if(e.key==='End'){ idx=total-1; render(); }
});

let touchX = null;
els.stage.addEventListener('touchstart', (e)=>{ touchX = e.touches[0].clientX; }, {passive:true});
els.stage.addEventListener('touchend', (e)=>{
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx) > 40){ dx < 0 ? go(1) : go(-1); }
  touchX = null;
}, {passive:true});

/* ================= BOOT SEQUENCE ================= */
const bootLines = [
  'INITIALIZING BAEBULDDUGI-OS v5.0 ...',
  'loading team modules: claude / codex / antigravity ...',
  'mounting episode 05 — CLI radio channel ...',
  '무전기 채널 열리는 중 <span class="cursor-blink"></span>'
];
const bootEl = document.getElementById('bootLines');
const startHint = document.getElementById('startHint');
let bi = 0;
function typeBootLine(){
  if(bi >= bootLines.length){
    startHint.style.opacity = '1';
    return;
  }
  const d = document.createElement('div');
  d.innerHTML = bootLines[bi];
  d.style.animationDelay = '0s';
  bootEl.appendChild(d);
  bi++;
  setTimeout(typeBootLine, 420);
}
typeBootLine();

function startShow(){
  const boot = document.getElementById('boot');
  boot.classList.add('hide');
  setTimeout(()=>{
    boot.style.display='none';
    document.getElementById('app').classList.remove('hidden');
    render();
  }, 480);
}
/* ================= 1920x1080 CANVAS AUTO-SCALE ================= */
function fitCanvas(){
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  document.getElementById('app').style.transform = `translate(-50%,-50%) scale(${scale})`;
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

document.getElementById('boot').addEventListener('click', startShow);
document.addEventListener('keydown', function once(e){
  if(!document.getElementById('app').classList.contains('hidden')) return;
  startShow();
  document.removeEventListener('keydown', once);
}, {once:false});
</script>
