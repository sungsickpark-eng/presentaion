<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>날씨 알림</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #eef3fb;
    --card: #ffffff;
    --text: #1b2431;
    --muted: #6b7685;
    --accent: #2f6fed;
    --warn-bg: #fff4e5;
    --warn-text: #8a5300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #10151f;
      --card: #1a2230;
      --text: #eef2f8;
      --muted: #9aa5b5;
      --accent: #5b8dff;
      --warn-bg: #3a2c12;
      --warn-text: #ffcf80;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: var(--card);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 18px;
    margin: 0 0 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .location {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .main-weather {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 12px 0 20px;
  }
  .icon { font-size: 56px; line-height: 1; }
  .temp { font-size: 44px; font-weight: 700; }
  .desc { color: var(--muted); font-size: 15px; }
  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .detail-item {
    background: var(--bg);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--muted);
  }
  .detail-item b { color: var(--text); font-size: 15px; display: block; }
  .alert-box {
    background: var(--warn-bg);
    color: var(--warn-text);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .alert-box.show { display: block; }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  button.secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .status { text-align: center; color: var(--muted); font-size: 13px; margin-top: 12px; }
  .welcome {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 14px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="welcome" id="welcome"></div>
    <h1>🌦️ 날씨 알림</h1>
    <div class="location" id="location">위치 확인 중...</div>

    <div class="main-weather">
      <div class="icon" id="icon">⏳</div>
      <div>
        <div class="temp" id="temp">--°</div>
        <div class="desc" id="desc">불러오는 중</div>
      </div>
    </div>

    <div class="details">
      <div class="detail-item">체감<b id="feels">--°</b></div>
      <div class="detail-item">풍속<b id="wind">-- m/s</b></div>
      <div class="detail-item">습도<b id="humidity">--%</b></div>
      <div class="detail-item">강수확률<b id="precip">--%</b></div>
    </div>

    <div class="alert-box" id="alertBox"></div>

    <button id="notifyBtn">🔔 알림 켜기</button>
    <button class="secondary" id="refreshBtn">새로고침</button>
    <div class="status" id="status"></div>
  </div>

<script>
  const els = {
    location: document.getElementById('location'),
    icon: document.getElementById('icon'),
    temp: document.getElementById('temp'),
    desc: document.getElementById('desc'),
    feels: document.getElementById('feels'),
    wind: document.getElementById('wind'),
    humidity: document.getElementById('humidity'),
    precip: document.getElementById('precip'),
    alertBox: document.getElementById('alertBox'),
    notifyBtn: document.getElementById('notifyBtn'),
    refreshBtn: document.getElementById('refreshBtn'),
    status: document.getElementById('status'),
  };

  let notifyEnabled = false;
  let lastAlertKey = '';

  function greetUser() {
    const key = 'weatherAppUserName';
    let name = localStorage.getItem(key);
    if (!name) {
      name = (prompt('이름을 입력해 주세요.') || '').trim();
      if (name) localStorage.setItem(key, name);
    }
    const hour = new Date().getHours();
    const timeGreeting = hour < 12 ? '좋은 아침이에요' : hour < 18 ? '좋은 오후예요' : '좋은 저녁이에요';
    document.getElementById('welcome').textContent = name
      ? `${timeGreeting}, ${name}님! 👋`
      : `${timeGreeting}! 👋`;
  }

  const WEATHER_CODES = {
    0: ['맑음', '☀️'], 1: ['대체로 맑음', '🌤️'], 2: ['약간 흐림', '⛅'], 3: ['흐림', '☁️'],
    45: ['안개', '🌫️'], 48: ['짙은 안개', '🌫️'],
    51: ['이슬비 약함', '🌦️'], 53: ['이슬비', '🌦️'], 55: ['이슬비 강함', '🌧️'],
    61: ['비 약함', '🌦️'], 63: ['비', '🌧️'], 65: ['비 강함', '🌧️'],
    66: ['어는 비', '🌧️'], 67: ['어는 비 강함', '🌧️'],
    71: ['눈 약함', '🌨️'], 73: ['눈', '❄️'], 75: ['눈 강함', '❄️'], 77: ['진눈깨비', '🌨️'],
    80: ['소나기 약함', '🌦️'], 81: ['소나기', '🌧️'], 82: ['소나기 강함', '⛈️'],
    85: ['소낙눈 약함', '🌨️'], 86: ['소낙눈 강함', '❄️'],
    95: ['뇌우', '⛈️'], 96: ['뇌우(우박)', '⛈️'], 99: ['강한 뇌우(우박)', '⛈️'],
  };

  function describe(code) {
    return WEATHER_CODES[code] || ['알 수 없음', '❓'];
  }

  function setStatus(msg) {
    els.status.textContent = msg;
  }

  function showAlert(text) {
    els.alertBox.textContent = text;
    els.alertBox.classList.add('show');
  }
  function hideAlert() {
    els.alertBox.classList.remove('show');
  }

  function maybeNotify(key, title, body) {
    if (!notifyEnabled) return;
    if (key === lastAlertKey) return; // 같은 알림 중복 방지
    lastAlertKey = key;
    if (Notification.permission === 'granted') {
      new Notification(title, { body, icon: undefined });
    }
  }

  function evaluateAlerts(data) {
    const code = data.current.weather_code;
    const temp = data.current.temperature_2m;
    const wind = data.current.wind_speed_10m;
    const precipProb = data.hourly?.precipitation_probability?.[0] ?? 0;

    const messages = [];
    if ([95, 96, 99].includes(code)) messages.push('⚡ 뇌우 주의! 외출 시 주의하세요.');
    else if ([61,63,65,66,67,80,81,82].includes(code)) messages.push('☔ 비가 오고 있어요. 우산을 챙기세요!');
    else if ([71,73,75,77,85,86].includes(code)) messages.push('❄️ 눈이 오고 있어요. 미끄러짐에 주의하세요!');
    if (precipProb >= 60 && messages.length === 0) messages.push(`☔ 강수확률 ${precipProb}%, 우산을 챙기는 게 좋겠어요.`);
    if (temp >= 33) messages.push('🥵 폭염 주의! 야외활동을 자제하세요.');
    if (temp <= -10) messages.push('🥶 한파 주의! 방한에 신경 쓰세요.');
    if (wind >= 14) messages.push('🌬️ 강풍 주의!');

    if (messages.length > 0) {
      const text = messages.join(' ');
      showAlert(text);
      maybeNotify(messages.join('|'), '날씨 알림', text);
    } else {
      hideAlert();
      lastAlertKey = '';
    }
  }

  function render(data, place) {
    const [descText, icon] = describe(data.current.weather_code);
    els.location.textContent = place;
    els.icon.textContent = icon;
    els.temp.textContent = `${Math.round(data.current.temperature_2m)}°`;
    els.desc.textContent = descText;
    els.feels.textContent = `${Math.round(data.current.apparent_temperature)}°`;
    els.wind.textContent = `${data.current.wind_speed_10m.toFixed(1)} m/s`;
    els.humidity.textContent = `${data.current.relative_humidity_2m}%`;
    els.precip.textContent = `${data.hourly?.precipitation_probability?.[0] ?? 0}%`;
    evaluateAlerts(data);
  }

  async function reverseGeocode(lat, lon) {
    try {
      const res = await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=ko`);
      const json = await res.json();
      const r = json.results?.[0];
      if (!r) return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      return [r.name, r.admin1].filter(Boolean).join(', ');
    } catch {
      return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    }
  }

  async function fetchWeather(lat, lon) {
    setStatus('날씨 정보를 불러오는 중...');
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m` +
      `&hourly=precipitation_probability&forecast_days=1&timezone=auto`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('날씨 API 오류');
    const data = await res.json();
    // normalize field name used above (current vs current_variables)
    data.current.weather_code = data.current.weather_code;
    const place = await reverseGeocode(lat, lon);
    render(data, place);
    setStatus('마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR'));
  }

  function locateAndFetch() {
    setStatus('위치 확인 중...');
    if (!navigator.geolocation) {
      setStatus('브라우저가 위치 정보를 지원하지 않습니다.');
      // fallback: 서울
      fetchWeather(37.5665, 126.9780).catch(() => setStatus('날씨 정보를 불러오지 못했습니다.'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        fetchWeather(pos.coords.latitude, pos.coords.longitude)
          .catch(() => setStatus('날씨 정보를 불러오지 못했습니다.'));
      },
      () => {
        setStatus('위치 권한이 거부되어 서울 날씨를 표시합니다.');
        fetchWeather(37.5665, 126.9780).catch(() => setStatus('날씨 정보를 불러오지 못했습니다.'));
      },
      { timeout: 8000 }
    );
  }

  els.notifyBtn.addEventListener('click', async () => {
    if (!('Notification' in window)) {
      alert('이 브라우저는 알림을 지원하지 않습니다.');
      return;
    }
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      notifyEnabled = true;
      els.notifyBtn.textContent = '🔔 알림 켜짐';
      els.notifyBtn.disabled = true;
    } else {
      alert('알림 권한이 거부되었습니다.');
    }
  });

  els.refreshBtn.addEventListener('click', locateAndFetch);

  greetUser();
  locateAndFetch();
  setInterval(locateAndFetch, 15 * 60 * 1000); // 15분마다 자동 갱신
</script>
</body>
</html>
