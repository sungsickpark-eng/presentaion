<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하늘알림 | 실시간 날씨 & 재난 특보 서비스</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-sunny">
    <div class="glass-bg"></div>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i data-lucide="cloud-lightning" class="logo-icon"></i>
                <div class="logo-text">
                    <h1>하늘알림</h1>
                    <span>AetherCast & Alerts</span>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="search-input" placeholder="도시명을 입력하세요 (예: 서울, 부산, Jeju)..." autocomplete="off">
                    <button id="geo-btn" title="현재 위치 날씨 보기">
                        <i data-lucide="map-pin"></i>
                    </button>
                </div>
                <div id="search-results" class="search-results hidden"></div>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Left Side: Weather Status and Forecast -->
            <section class="weather-section">
                <!-- Alert Banner -->
                <div id="alert-banner" class="alert-banner status-safe">
                    <div class="alert-content">
                        <i data-lucide="check-circle-2" class="alert-icon"></i>
                        <div class="alert-text">
                            <h3 id="alert-title">현재 기상 특보가 없습니다</h3>
                            <p id="alert-desc">오늘도 안전하고 건강한 하루 되세요.</p>
                        </div>
                    </div>
                    <button id="alert-action-btn" class="hidden">대피 요령 보기</button>
                </div>

                <!-- Current Weather Card -->
                <div class="weather-card glass-card">
                    <div class="card-header">
                        <div class="location-info">
                            <h2 id="location-name">서울특별시</h2>
                            <span id="current-date">2026. 07. 05. 일요일</span>
                        </div>
                        <div class="weather-badge" id="weather-badge">맑음</div>
                    </div>
                    
                    <div class="card-body">
                        <div class="temp-display">
                            <span id="current-temp" class="temp-val">26.5</span><span class="temp-unit">°C</span>
                            <div class="weather-main-icon" id="weather-icon-container">
                                <i data-lucide="sun" class="main-icon animated-icon"></i>
                            </div>
                        </div>
                        
                        <div class="weather-details">
                            <div class="detail-item">
                                <i data-lucide="thermometer"></i>
                                <div class="detail-info">
                                    <span class="label">체감 온도</span>
                                    <span class="value" id="feels-like">27.8°C</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <i data-lucide="droplets"></i>
                                <div class="detail-info">
                                    <span class="label">습도</span>
                                    <span class="value" id="humidity">65%</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <i data-lucide="wind"></i>
                                <div class="detail-info">
                                    <span class="label">바람</span>
                                    <span class="value" id="wind-speed">2.4 m/s</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <i data-lucide="cloud-rain"></i>
                                <div class="detail-info">
                                    <span class="label">강수량</span>
                                    <span class="value" id="precipitation">0 mm</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hourly Forecast -->
                <div class="hourly-forecast glass-card">
                    <h3>시간대별 예보</h3>
                    <div class="hourly-list" id="hourly-list">
                        <!-- Simulated Hourly Data -->
                    </div>
                </div>

                <!-- Daily Forecast -->
                <div class="daily-forecast glass-card">
                    <h3>주간 예보</h3>
                    <div class="daily-list" id="daily-list">
                        <!-- Simulated Daily Data -->
                    </div>
                </div>
            </section>

            <!-- Right Side: Sidebar / Controls and Simulator -->
            <aside class="sidebar-section">
                <!-- Quick Locations -->
                <div class="quick-locations glass-card">
                    <h3>주요 도시 날씨</h3>
                    <div class="quick-list">
                        <button class="city-btn active" data-lat="37.5665" data-lon="126.9780">서울</button>
                        <button class="city-btn" data-lat="35.1796" data-lon="129.0756">부산</button>
                        <button class="city-btn" data-lat="37.4563" data-lon="126.7052">인천</button>
                        <button class="city-btn" data-lat="35.8714" data-lon="128.6014">대구</button>
                        <button class="city-btn" data-lat="36.3504" data-lon="127.3845">대전</button>
                        <button class="city-btn" data-lat="35.1595" data-lon="126.8526">광주</button>
                        <button class="city-btn" data-lat="33.4996" data-lon="126.5312">제주</button>
                    </div>
                </div>

                <!-- Alert Simulator Control -->
                <div class="simulator-card glass-card">
                    <div class="sim-header">
                        <i data-lucide="sliders"></i>
                        <h3>기상 특보 시뮬레이터</h3>
                    </div>
                    <p class="sim-desc">원하는 특보 상황을 선택해 시스템 반응과 경보 UI를 테스트해보세요.</p>
                    
                    <div class="sim-grid">
                        <button class="sim-btn sim-clear active" data-type="clear">
                            <i data-lucide="sun"></i>
                            <span>일반 날씨</span>
                        </button>
                        <button class="sim-btn sim-rain" data-type="rain">
                            <i data-lucide="cloud-rain"></i>
                            <span>호우 경보</span>
                        </button>
                        <button class="sim-btn sim-heatwave" data-type="heatwave">
                            <i data-lucide="thermometer-sun"></i>
                            <span>폭염 경보</span>
                        </button>
                        <button class="sim-btn sim-snow" data-type="snow">
                            <i data-lucide="snowflake"></i>
                            <span>대설 경보</span>
                        </button>
                        <button class="sim-btn sim-wind" data-type="wind">
                            <i data-lucide="wind"></i>
                            <span>강풍 경보</span>
                        </button>
                        <button class="sim-btn sim-dust" data-type="dust">
                            <i data-lucide="alert-triangle"></i>
                            <span>황사 경보</span>
                        </button>
                    </div>

                    <div class="sim-options">
                        <div class="option-row">
                            <label for="sound-toggle">알림 사운드 켜기</label>
                            <div class="toggle-switch">
                                <input type="checkbox" id="sound-toggle" checked>
                                <label for="sound-toggle"></label>
                            </div>
                        </div>
                        <div class="option-row">
                            <label for="tts-toggle">TTS 음성 안내</label>
                            <div class="toggle-switch">
                                <input type="checkbox" id="tts-toggle">
                                <label for="tts-toggle"></label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Emergency Instructions Modal Trigger / Panel -->
                <div class="instructions-card glass-card hidden" id="guidelines-card">
                    <div class="ins-header">
                        <i data-lucide="shield-alert" class="warning-icon"></i>
                        <h3 id="guideline-title">국민행동요령</h3>
                    </div>
                    <div class="ins-content" id="guideline-content">
                        <!-- Guidelines Dynamic Content -->
                    </div>
                </div>
            </aside>
        </main>

        <!-- Footer -->
        <footer>
            <p>© 2026 하늘알림. 모든 날씨 정보는 Open-Meteo API를 통해 실시간으로 갱신됩니다.</p>
        </footer>
    </div>

    <!-- Web Audio Beep sound generator & Script loader -->
    <script src="app.js"></script>
</body>
</html>
